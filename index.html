<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <title>Eco Smart Exam</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="alternate icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/pwa_icon.jpg" />
    <script>
      // Capture the PWA install prompt at the earliest moment
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredSDKPrompt = e;
        // Dispatch custom event so React can listen to it if it already mounted
        window.dispatchEvent(new CustomEvent('pwa-prompt-available', { detail: e }));
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('ServiceWorker registered successfully:', reg.scope))
            .catch((err) => console.error('ServiceWorker registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
