<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" /> <!-- Emerald 500 -->
      <stop offset="100%" stop-color="#059669" /> <!-- Emerald 600 -->
    </linearGradient>
    <linearGradient id="gradCap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo 600 -->
      <stop offset="100%" stop-color="#312E81" /> <!-- Indigo 900 -->
    </linearGradient>
    <linearGradient id="gradCircle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5" /> <!-- Emerald 50 -->
      <stop offset="100%" stop-color="#EEF2FF" /> <!-- Indigo 50 -->
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Outer Ambient Glow/Shadow -->
  <circle cx="256" cy="256" r="220" fill="url(#gradCircle)" filter="url(#dropShadow)" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#F1F5F9" stroke-width="4" />

  <!-- Shield/Hexagon Base for Smart Structure -->
  <path d="M 256,90 L 390,167 L 390,323 L 256,400 L 122,323 L 122,167 Z" fill="none" stroke="url(#gradCap)" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" opacity="0.15" />

  <!-- The Eco Leaf & Graduation Cap Fusion -->
  <!-- Leaf Base (Back Layer) -->
  <path d="M 256,120 C 340,120 370,190 350,270 C 330,350 256,380 256,380 C 256,380 182,350 162,270 C 142,190 172,120 256,120 Z" fill="url(#gradLeaf)" opacity="0.85" />
  
  <!-- Leaf Spine/Vein with Glowing Line -->
  <path d="M 256,120 C 256,120 266,220 236,360" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.4" />

  <!-- Graduation Cap (Smart Exam) Layer -->
  <!-- Cap Diamond Shape -->
  <polygon points="256,180 370,225 256,270 142,225" fill="url(#gradCap)" filter="url(#dropShadow)" />
  
  <!-- Cap Skull Cap & Tassel -->
  <path d="M 200,248 L 200,290 C 200,310 312,310 312,290 L 312,248" fill="#312E81" />
  <path d="M 370,225 L 385,260 L 385,310" fill="none" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="385" cy="312" r="6" fill="#FBBF24" />

  <!-- Glowing Smart Checkmark in the Center -->
  <path d="M 215,250 L 245,280 L 315,200" fill="none" stroke="#10B981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)" />
  <path d="M 215,250 L 245,280 L 315,200" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Text Badge (Optional / Integrated) -->
  <path id="curve" d="M 120,410 Q 256,470 392,410" fill="none" />
  <text font-family="'Inter', sans-serif" font-size="24" font-weight="900" fill="#0F172A" letter-spacing="4">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">ECO SMART EXAM</textPath>
  </text>
</svg>
