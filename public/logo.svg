<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients matching the Eco Smart green & cyan/teal palette -->
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="50%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="gradTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FDF4" />
      <stop offset="100%" stop-color="#ECFEFF" />
    </linearGradient>
    <linearGradient id="gradShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="60%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Ambient background glow for a premium feel -->
  <rect width="100%" height="100%" fill="none" />

  <!-- The Main Eco Shield -->
  <g filter="url(#shadow)">
    <!-- Outer Shield Frame -->
    <path d="M 256,45 
             C 315,20 400,40 400,120 
             C 400,250 330,350 256,415 
             C 182,350 112,250 112,120 
             C 112,40 197,20 256,45 Z" 
          fill="none" 
          stroke="url(#gradShield)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Left Stylized Leaf forming the shield's left shoulder -->
    <path d="M 256,45 
             C 185,45 125,110 125,180 
             C 125,240 160,290 200,320
             C 165,260 165,160 256,110" 
          fill="url(#gradGreen)" 
          opacity="0.9" />
          
    <path d="M 185,85 
             C 145,120 135,170 145,210 
             C 155,170 185,130 225,115" 
          fill="#FFFFFF" 
          opacity="0.3" />

    <!-- Big organic leaf accent wrapping around the top left -->
    <path d="M 256,45 
             C 210,15 140,55 140,110
             C 140,140 165,150 195,135
             C 240,110 256,70 256,45 Z" 
          fill="url(#gradGreen)" />
  </g>

  <!-- Central Lightbulb & Technology Fusion -->
  <g transform="translate(10, 0)">
    <!-- Lightbulb Outline -->
    <path d="M 246,140 
             C 290,140 326,176 326,220 
             C 326,250 310,275 296,290 
             L 296,315 
             C 296,320 292,324 286,324 
             L 206,324 
             C 200,324 196,320 196,315 
             L 196,290 
             C 182,275 166,250 166,220 
             C 166,176 202,140 246,140 Z" 
          fill="none" 
          stroke="#059669" 
          stroke-width="6" 
          stroke-linejoin="round" 
          stroke-linecap="round" />

    <!-- Bulb Thread / Base (Screw) -->
    <path d="M 216,324 C 216,334 276,334 276,324" fill="none" stroke="#059669" stroke-width="6" stroke-linecap="round" />
    <path d="M 221,334 C 221,344 271,344 271,334" fill="none" stroke="#059669" stroke-width="6" stroke-linecap="round" />
    <path d="M 231,344 C 231,352 261,352 261,344" fill="none" stroke="#059669" stroke-width="6" stroke-linecap="round" />

    <!-- Solar/Sun Energy (Top Right of Lightbulb) -->
    <path d="M 310,170 A 24,24 0 0,1 330,195" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" />
    <!-- Sun Rays -->
    <line x1="324" y1="164" x2="334" y2="154" stroke="#10B981" stroke-width="4" stroke-linecap="round" />
    <line x1="336" y1="178" x2="348" y2="174" stroke="#10B981" stroke-width="4" stroke-linecap="round" />
    <line x1="342" y1="194" x2="356" y2="196" stroke="#10B981" stroke-width="4" stroke-linecap="round" />
    <line x1="338" y1="212" x2="350" y2="218" stroke="#10B981" stroke-width="4" stroke-linecap="round" />

    <!-- Digital Node Circuits (Right Side) -->
    <path d="M 316,230 L 346,230" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" />
    <circle cx="346" cy="230" r="4" fill="#06B6D4" />

    <path d="M 310,255 L 335,255 L 345,265" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" />
    <circle cx="345" cy="265" r="4" fill="#06B6D4" />

    <path d="M 296,278 L 326,278" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" />
    <circle cx="326" cy="278" r="4" fill="#06B6D4" />

    <!-- Open Book in Center of Lightbulb -->
    <path d="M 246,270 
             C 246,270 230,245 206,245 
             C 186,245 176,255 176,255 
             L 176,220 
             C 176,220 186,210 206,210 
             C 230,210 246,230 246,230 
             C 246,230 262,210 286,210 
             C 306,210 316,220 316,220 
             L 316,255 
             C 316,255 306,245 286,245 
             C 262,245 246,270 246,270 Z" 
          fill="none" 
          stroke="#059669" 
          stroke-width="4.5" 
          stroke-linejoin="round" 
          stroke-linecap="round" />
    <!-- Book Center spine line -->
    <line x1="246" y1="230" x2="246" y2="270" stroke="#059669" stroke-width="4" stroke-linecap="round" />

    <!-- Evaluation Growth Stats (Bar Chart & Upward Trend Arrow) -->
    <!-- Bars -->
    <rect x="254" y="218" width="6" height="15" fill="#10B981" rx="1" />
    <rect x="265" y="208" width="6" height="25" fill="#10B981" rx="1" />
    <rect x="276" y="198" width="6" height="35" fill="#10B981" rx="1" />
    <!-- Arrow -->
    <path d="M 252,224 L 272,204 L 282,210 L 294,192" fill="none" stroke="#059669" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <polygon points="294,192 286,192 294,200" fill="#059669" />

    <!-- Two Sprouts/Leaves growing on the top left inside the bulb -->
    <path d="M 236,205 C 220,185 210,185 190,190 C 205,170 225,180 232,195 Z" fill="url(#gradGreen)" />
    <path d="M 234,192 C 225,178 220,174 205,175 C 215,162 230,168 232,182 Z" fill="url(#gradGreen)" />
  </g>

  <!-- "ECO SMART EXAM" Typography Badge below -->
  <g transform="translate(0, 420)">
    <!-- Background Text Frame for contrast -->
    <text x="256" y="32" 
          font-family="'Inter', system-ui, -apple-system, sans-serif" 
          font-weight="900" 
          font-size="28" 
          fill="#15803D" 
          text-anchor="middle" 
          letter-spacing="5">ECO SMART EXAM</text>
    
    <text x="256" y="58" 
          font-family="'Inter', system-ui, -apple-system, sans-serif" 
          font-weight="800" 
          font-size="11" 
          fill="#0F766E" 
          text-anchor="middle" 
          letter-spacing="3.5">SUSTAINABLE | DIGITAL | EVALUATION</text>
  </g>
</svg>
